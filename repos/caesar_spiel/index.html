<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interaktive Caesar-Scheibe</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f172a; color: #e2e8f0; }
      .app { width: min(920px, 95vw); padding: 1.2rem; background: #111827; border-radius: 16px; box-shadow: 0 10px 30px #0007; }
      h1 { margin-top: 0; font-size: 1.5rem; }
      .layout { display: grid; grid-template-columns: 320px 1fr; gap: 1rem; }
      .wheel-wrap { display: grid; place-items: center; }
      .ring { position: relative; border-radius: 50%; display: grid; place-items: center; user-select: none; }
      .outer { width: 280px; height: 280px; border: 12px solid #334155; background: radial-gradient(circle, #1e293b 60%, #0b1220 100%); }
      .inner { width: 190px; height: 190px; border: 10px solid #64748b; background: radial-gradient(circle, #0f172a 58%, #020617 100%); transform: rotate(0deg); transition: transform .2s ease; }
      .letter { position: absolute; left: 50%; top: 50%; transform-origin: 0 0; font-weight: 700; font-size: .9rem; }
      .controls { display: grid; gap: .8rem; }
      label { font-size: .9rem; color: #cbd5e1; display: grid; gap: .35rem; }
      input[type="text"], textarea, select, button, input[type="range"] {
        width: 100%; border-radius: 10px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; padding: .6rem .7rem;
      }
      textarea { min-height: 96px; resize: vertical; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
      .out { background: #0b1220; border: 1px solid #334155; border-radius: 10px; padding: .8rem; min-height: 84px; white-space: pre-wrap; }
      button { cursor: pointer; font-weight: 700; background: #1d4ed8; border-color: #1d4ed8; }
      @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Interaktive Caesar-Scheibe</h1>
      <div class="layout">
        <section class="wheel-wrap">
          <div class="ring outer" id="outerRing">
            <div class="ring inner" id="innerRing"></div>
          </div>
        </section>
        <section class="controls">
          <div class="row">
            <label>Modus
              <select id="mode">
                <option value="encrypt">Verschlüsseln</option>
                <option value="decrypt">Entschlüsseln</option>
              </select>
            </label>
            <label>Verschiebung: <span id="shiftLabel">3</span>
              <input id="shift" type="range" min="0" max="25" value="3" />
            </label>
          </div>
          <label>Text
            <textarea id="inputText" placeholder="Nachricht eingeben..."></textarea>
          </label>
          <button id="run">Umwandeln</button>
          <label>Ergebnis</label>
          <div class="out" id="result"></div>
        </section>
      </div>
    </main>

    <script>
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const outerRing = document.getElementById("outerRing");
      const innerRing = document.getElementById("innerRing");
      const shiftInput = document.getElementById("shift");
      const shiftLabel = document.getElementById("shiftLabel");
      const modeInput = document.getElementById("mode");
      const inputText = document.getElementById("inputText");
      const result = document.getElementById("result");
      const run = document.getElementById("run");

      function placeLetters(target, letters, radius) {
        [...letters].forEach((ch, i) => {
          const angle = (360 / letters.length) * i - 90;
          const span = document.createElement("span");
          span.className = "letter";
          span.textContent = ch;
          span.style.transform = `rotate(${angle}deg) translate(${radius}px) rotate(${-angle}deg)`;
          target.appendChild(span);
        });
      }

      placeLetters(outerRing, alphabet, 122);
      placeLetters(innerRing, alphabet, 78);

      function rotateInner() {
        const shift = Number(shiftInput.value);
        innerRing.style.transform = `rotate(${shift * (360 / 26)}deg)`;
        shiftLabel.textContent = String(shift);
      }

      function caesar(text, shift, mode) {
        const realShift = mode === "encrypt" ? shift : (26 - shift) % 26;
        return [...text].map((char) => {
          const up = char.toUpperCase();
          const idx = alphabet.indexOf(up);
          if (idx < 0) return char;
          const next = alphabet[(idx + realShift) % 26];
          return char === up ? next : next.toLowerCase();
        }).join("");
      }

      function transform() {
        const shift = Number(shiftInput.value);
        const mode = modeInput.value;
        result.textContent = caesar(inputText.value, shift, mode);
      }

      shiftInput.addEventListener("input", () => { rotateInner(); transform(); });
      modeInput.addEventListener("change", transform);
      inputText.addEventListener("input", transform);
      run.addEventListener("click", transform);

      rotateInner();
      transform();
    </script>
  </body>
  </html>
